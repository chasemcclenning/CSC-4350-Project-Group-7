name: Build native installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  macos:
    name: macOS DMG
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build DMG
        run: ./packaging/package-macos.sh

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Libris-macOS
          path: target/installer/*.dmg
          if-no-files-found: error

  windows:
    name: Windows EXE
    runs-on: windows-2022
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Install WiX Toolset
        shell: pwsh
        run: choco install wixtoolset --no-progress --yes

      - name: Build EXE
        shell: pwsh
        run: .\packaging\package-windows.ps1

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: Libris-Windows
          path: target/installer/*.exe
          if-no-files-found: error
